# Minimal verification profile for checking that the ShinkaEvolve loop runs.
max_evaluation_jobs: 1
max_proposal_jobs: 1
max_db_workers: 1

job_config:
  eval_program_path: evaluate.py
  time: "00:20:00"

db_config:
  num_islands: 1
  archive_size: 10
  elite_selection_ratio: 0.3
  num_archive_inspirations: 1
  num_top_k_inspirations: 1
  migration_interval: 10
  migration_rate: 0.1
  island_elitism: true
  enforce_island_separation: true
  parent_selection_strategy: weighted
  parent_selection_lambda: 10
  archive_selection_strategy: "crowding"
  island_selection_strategy: equal
  archive_criteria:
    combined_score: 1.0
    loc: -0.05
  enable_dynamic_islands: false
  stagnation_threshold: 10
  island_spawn_strategy: "best"
  island_spawn_subtree_size: 2

evo_config:
  patch_types:
    - diff
    - full
    - cross
  patch_type_probs:
    - 0.6
    - 0.3
    - 0.1
  num_generations: 10
  max_api_costs: 0.5
  max_patch_resamples: 2
  max_patch_attempts: 2
  max_novelty_attempts: 1
  job_type: local
  language: python
  llm_models:
    - "gpt-5.4-mini"
  llm_kwargs:
    temperatures:
      - 0
    reasoning_efforts:
      - medium
    max_tokens: 16384
  meta_rec_interval: 5
  meta_llm_models:
    - gpt-5.4-mini
  meta_llm_kwargs:
    temperatures:
      - 0
    max_tokens: 8192
  embedding_model: text-embedding-3-small
  code_embed_sim_threshold: 0.99
  novelty_llm_models:
    - gpt-5.4-nano
  novelty_llm_kwargs:
    temperatures:
      - 0
  init_program_path: initial.py
  llm_dynamic_selection: ucb1
  llm_dynamic_selection_kwargs:
    exploration_coef: 1.0
    cost_aware_coef: 0.7
  results_dir: results/results_rag_evo_simple_smoke
  evolve_prompts: false
